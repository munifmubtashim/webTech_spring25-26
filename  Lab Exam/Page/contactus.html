<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us From</title>
</head>

<body>
    <link rel="stylesheet" href="/ Lab Exam/Design/style.css">
    <h1>Contact us</h1>
    <form>
        <table>
            <tr>
                <td>
                    <label for="first">FIRST NAME</label>
                    <br>
                    <input type="text" id="first">
                
                </td>
                <td>
                    <label for="last">LAST NAME</label>
                    <br>
                    <input type="text" id="last">
                </td>
            </tr>
            
            <tr>
                <td>
                    <label for="email">Email</label>
                    <br>
                    <input type="text" id="email">
                </td>
                <td>
                    <label for="phone">PHONE NUMBER</label>
                    <br>
                    <input type="text" id="phone">
                </td>
            </tr>
            <tr class="tbox">
                <td>
                    <label for="tbox">WHAT DO YOU HAVE IN  MIND</label>
                    <br>
                    <textarea name="textbox" id="tbox" placeholder="Please enter query"></textarea>
                </td>
                
            </tr>
            <tr>
                <td>
                    <input type="submit" value="Submit" class="submit" placeholder="Please enter query">
                </td>
            </tr>
        

        </table>
    </form>


</body>

</html>
