<!DOCTYPE html>
<html>
    <title> Registration Page </title>
    <body>
        <link rel="stylesheet" href="/Lab4/Design/style.css">
   
    <div class="header">
        <h1> ABC Hospital Limited </h1>
    </div>

    <div class = "topnav">
        <a href="https://www.aiub.edu/"> AIUB WEBSITE </a>
    </div>

    <head>
        <script src="/Lab4/Javascript/script.js"> </script>
        <h1> Patient Registration (Adnmission) </h1>
    </head>
<!-- onsubmit="return collect_data()" -->
    <form>
        <!-- <table> 
            <tr><label for ="Name">Patient Name: </label></tr>
            <td><input type ="text" id="PatientName" name ="Name" placeholder = "Enter the Name"  onclick="return collect_data()"> <br><br></td>
            <p id ="NameError"> </p>
        </table> -->

        <table> 
            <tr><label for ="Name">Patient Name: </label></tr>
            <td><input type ="text" id="PatientName" name ="Name" placeholder = "Enter the Name"  onchange="return collect_data()"> <br><br></td>
            <p id ="NameError"> </p>
        </table>

        <label for="Age">Age:</label>
        <input type="number" id="Age" name="PatientAge">
        <br><br>

        <label for="DOB"> Date of Birth: </label>
        <input type="date" id="DOB" name ="PatientDOB"> <br><br>

        <label for="GenderMale"> Male: </label>
        <input type = "radio" id="GenderMale" name="Gender" value="Male">
        
        <br><br>

        <label for="GenderFemale"> Female: </label>
        <input type = "radio" id="GenderFemale" name="Gender" value="Female">

        

        <br><br>

        <label for="Address">Address:</label>
        <textarea id="Address" name ="PatientAddress" rows="4" cols="30" placeholder="Enter The Address" onkeyup="return  get_textarea()" ></textarea>

        <br><br>

        <label for="InsertFiles">Patient Medical Report: </label>
        <input type ="file" id="InsertFiles" name="PatientFile">

        <br><br>

        <label for ="Doctor">Prefered Doctor Lists: </label>
       
        <select>
            <option values="Default"> </option>
            <option values="Cardiac"> Cardiac</option>
            <option values="Skin"> Skin </option>
        </select>

        <br><br>

        <!-- <label for="Submit">Submit Info: </label>
        <input type="submit" id="submit" name="DataSubmit"> -->
        <button id ="keysubmit" onclick="return submit_key()"> Data Submit </button>
        

    </form>
</body>
</html>
